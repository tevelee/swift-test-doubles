included:
  - Sources
  - Tests

excluded:
  - "**/.build"
  - Packages

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - explicit_init
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - is_disjoint
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - shorthand_operator
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - yoda_condition

analyzer_rules:
  - unused_import

file_length:
  warning: 900
  error: 1500

type_body_length:
  warning: 650
  error: 1200

function_body_length:
  warning: 220
  error: 400

line_length:
  warning: 240
  error: 300
  ignores_comments: true
  ignores_urls: true

type_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80

identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80
  allowed_symbols: ["_"]

nesting:
  type_level:
    warning: 3
    error: 5

function_parameter_count:
  warning: 12
  error: 14

large_tuple:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 35
  error: 50

# swift-format owns formatting; these rules would fight it. A few legacy rules
# stay disabled until the corresponding APIs and ABI tests are deliberately
# refactored instead of mechanically rewritten by CI adoption.
disabled_rules:
  - closure_parameter_position
  - control_statement
  - empty_string
  - force_try
  - multiple_closures_with_trailing_closure
  - redundant_void_return
  - switch_case_alignment
  - trailing_comma
  - for_where
  - trailing_whitespace
  - vertical_whitespace
  - opening_brace
  - trailing_newline
  - indentation_width
  - todo
  - no_magic_numbers
  - no_extension_access_modifier
  - unused_setter_value

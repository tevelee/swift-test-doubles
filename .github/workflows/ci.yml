name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12

  minimum-toolchain:
    name: Swift 6.1 / arm64
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Restore SwiftPM cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: >-
            swiftpm-v1-${{ runner.os }}-${{ runner.arch }}-${{
            hashFiles('Package.resolved', 'IntegrationTests/Consumer/Package.resolved') }}
          restore-keys: |
            swiftpm-v1-${{ runner.os }}-${{ runner.arch }}-
      - name: Select Xcode 16.4
        run: sudo xcode-select --switch /Applications/Xcode_16.4.app/Contents/Developer
      - name: Show toolchain
        run: swift --version
      - name: Test debug
        run: swift test --scratch-path .build/ci
      - name: Test release
        run: swift test -c release --scratch-path .build/ci
      - name: Test as an external consumer
        run: >-
          swift test
          --package-path IntegrationTests/Consumer
          --scratch-path .build/consumer-ci
      - name: Check public API
        run: Scripts/check-public-api.sh
      - name: Validate documentation
        run: Scripts/validate-documentation.sh

  current-toolchain:
    name: Current Xcode / arm64
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Restore SwiftPM cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: >-
            swiftpm-v1-${{ runner.os }}-${{ runner.arch }}-${{
            hashFiles('Package.resolved', 'IntegrationTests/Consumer/Package.resolved') }}
          restore-keys: |
            swiftpm-v1-${{ runner.os }}-${{ runner.arch }}-
      - name: Show toolchain
        run: swift --version
      - name: Test debug
        run: swift test --scratch-path .build/current-toolchain

  linux-compatibility:
    name: Swift 6.1 / Ubuntu 24.04 / ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            architecture: x86_64
          - runner: ubuntu-24.04-arm
            architecture: arm64
    runs-on: ${{ matrix.runner }}
    container: swift:6.1.3-noble
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Restore SwiftPM cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/org.swift.swiftpm
          key: >-
            swiftpm-v1-${{ runner.os }}-${{ runner.arch }}-${{
            hashFiles('Package.resolved', 'IntegrationTests/Consumer/Package.resolved') }}
          restore-keys: |
            swiftpm-v1-${{ runner.os }}-${{ runner.arch }}-
      - name: Show toolchain
        run: swift --version
      - name: Resolve dependency checkouts
        run: |
          swift package --scratch-path .build/linux-compatibility resolve
          swift package \
            --package-path IntegrationTests/Consumer \
            --scratch-path .build/linux-compatibility-consumer \
            resolve
      - name: Apply candidate Echo compatibility fix
        run: |
          for checkout in \
            .build/linux-compatibility/checkouts/Echo \
            .build/linux-compatibility-consumer/checkouts/Echo
          do
            source="$checkout/Sources/Echo/ContextDescriptor/ClassDescriptor.swift"
            if test -f "$source" && grep -q 'Int\.AtomicRepresentation' "$source"; then
              sed -i \
                's/Int\.AtomicRepresentation/UnsafeAtomic<Int>.Storage/g' \
                "$source"
            fi
          done
      - name: Test debug
        run: swift test --scratch-path .build/linux-compatibility
      - name: Test release
        run: swift test -c release --scratch-path .build/linux-compatibility
      - name: Test as an external consumer
        run: >-
          swift test
          --package-path IntegrationTests/Consumer
          --scratch-path .build/linux-compatibility-consumer

  apple-platforms:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS 16+ Simulator / arm64
            destination: platform=iOS Simulator,name=TestDoubles CI,OS=18.5
            device_type: com.apple.CoreSimulator.SimDeviceType.iPhone-16
            runtime: com.apple.CoreSimulator.SimRuntime.iOS-18-5
          - name: Mac Catalyst 16+ / arm64
            destination: platform=macOS,arch=arm64,variant=Mac Catalyst
          - name: tvOS 16+ Simulator / arm64
            destination: platform=tvOS Simulator,name=TestDoubles CI,OS=18.5
            device_type: com.apple.CoreSimulator.SimDeviceType.Apple-TV-4K-3rd-generation-4K
            runtime: com.apple.CoreSimulator.SimRuntime.tvOS-18-5
          - name: visionOS 1+ Simulator / arm64
            destination: platform=visionOS Simulator,name=TestDoubles CI,OS=2.5
            device_type: com.apple.CoreSimulator.SimDeviceType.Apple-Vision-Pro
            runtime: com.apple.CoreSimulator.SimRuntime.xrOS-2-5
          - name: watchOS 9+ Simulator / arm64
            destination: platform=watchOS Simulator,name=TestDoubles CI,OS=11.5
            device_type: com.apple.CoreSimulator.SimDeviceType.Apple-Watch-Series-10-46mm
            runtime: com.apple.CoreSimulator.SimRuntime.watchOS-11-5
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Restore SwiftPM cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: >-
            swiftpm-v1-${{ runner.os }}-${{ runner.arch }}-${{
            hashFiles('Package.resolved', 'IntegrationTests/Consumer/Package.resolved') }}
          restore-keys: |
            swiftpm-v1-${{ runner.os }}-${{ runner.arch }}-
      - name: Select Xcode 16.4
        run: sudo xcode-select --switch /Applications/Xcode_16.4.app/Contents/Developer
      - name: Show toolchain
        run: swift --version
      - name: Create simulator
        if: matrix.device_type
        run: >-
          xcrun simctl create
          'TestDoubles CI'
          '${{ matrix.device_type }}'
          '${{ matrix.runtime }}'
      - name: Test
        run: >-
          xcodebuild
          -scheme swift-test-doubles
          -destination '${{ matrix.destination }}'
          -derivedDataPath .build/ci-apple-platform
          -quiet
          test

  rosetta:
    name: Swift 6.1 / Rosetta x86_64
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Restore SwiftPM cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: >-
            swiftpm-v1-${{ runner.os }}-${{ runner.arch }}-${{
            hashFiles('Package.resolved', 'IntegrationTests/Consumer/Package.resolved') }}
          restore-keys: |
            swiftpm-v1-${{ runner.os }}-${{ runner.arch }}-
      - name: Select Xcode 16.4
        run: sudo xcode-select --switch /Applications/Xcode_16.4.app/Contents/Developer
      - name: Install Rosetta
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: Show translated toolchain
        run: arch -x86_64 swift --version
      - name: Test runtime and concurrency
        run: |
          arch -x86_64 swift test \
            --scratch-path .build/ci-rosetta \
            --triple x86_64-apple-macosx \
            --disable-xctest \
            --enable-swift-testing \
            --filter 'RuntimeABITests|ConcurrencyTests|StubBuilderTests'
      - name: Test documentation examples as an external consumer
        run: |
          arch -x86_64 swift test \
            --package-path IntegrationTests/Consumer \
            --scratch-path .build/consumer-ci-x86_64 \
            --triple x86_64-apple-macosx \
            --disable-xctest \
            --enable-swift-testing

name: CI

on:
  push:
    branches: [main]
    paths:
      - .github/Brewfile
      - .github/actions/**
      - .github/workflows/ci.yml
      - .swift-format
      - .swift-version
      - .swiftlint.yml
      - Package.resolved
      - Package.swift
      - Scripts/**
      - Sources/**
      - "!Sources/TestDoubles/Documentation.docc/**"
      - Tests/**
  pull_request:
    paths:
      - .github/Brewfile
      - .github/actions/**
      - .github/workflows/ci.yml
      - .swift-format
      - .swift-version
      - .swiftlint.yml
      - Package.resolved
      - Package.swift
      - Scripts/**
      - Sources/**
      - "!Sources/TestDoubles/Documentation.docc/**"
      - Tests/**
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-quality:
    name: swift-format and swiftlint
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Check generated fixed-arity sources
        run: xcrun swift Scripts/generate-fixed-arity.swift --check
      - name: Check Swift ABI constants
        run: Scripts/check-swift-abi-constants.sh
      - name: Check internal source boundaries
        run: Scripts/check-internal-boundaries.sh
      - uses: ./.github/actions/brew-bundle
      - name: Run swift-format
        run: swift-format lint --strict --recursive Sources Tests
      - name: Run SwiftLint
        run: swiftlint lint --strict

  minimum-toolchain:
    name: Swift 6.3 / arm64
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Restore build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .build/ci
          key: >-
            swift-build-v1-${{ runner.os }}-${{ runner.arch
            }}-min-toolchain-${{
            hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swift-build-v1-${{ runner.os }}-${{ runner.arch }}-min-toolchain-
      - name: Select Xcode 26.4.1
        run: sudo xcode-select --switch /Applications/Xcode_26.4.1.app/Contents/Developer
      - name: Show toolchain
        run: swift --version
      - name: Check resolved dependencies are current
        run: |
          swift package --scratch-path .build/ci resolve
          git diff --exit-code -- Package.resolved
      - name: Test debug
        run: >-
          swift test
          --parallel
          --experimental-maximum-parallelization-width 4
          --scratch-path .build/ci
      - name: Test release
        run: >-
          swift test
          -c release
          --parallel
          --experimental-maximum-parallelization-width 4
          --skip ExitTests
          --scratch-path .build/ci
      - name: Test release exit diagnostics
        run: >-
          swift test
          -c release
          --filter ExitTests
          --scratch-path .build/ci
      - name: Validate documentation
        run: Scripts/validate-documentation.sh

  current-toolchain:
    name: Current Xcode / arm64
    runs-on: macos-26
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Restore build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .build/ci-current
          key: >-
            swift-build-v1-${{ runner.os }}-${{ runner.arch
            }}-current-toolchain-${{
            hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swift-build-v1-${{ runner.os }}-${{ runner.arch }}-current-toolchain-
      - name: Select Xcode 26.6
        run: sudo xcode-select --switch /Applications/Xcode_26.6.app/Contents/Developer
      - name: Show toolchain
        run: swift --version
      - name: Test debug
        run: >-
          swift test
          --parallel
          --experimental-maximum-parallelization-width 4
          --skip ExitTests
          --scratch-path .build/ci-current
      - name: Test release
        run: >-
          swift test
          -c release
          --parallel
          --experimental-maximum-parallelization-width 4
          --skip ExitTests
          --scratch-path .build/ci-current
  linux:
    name: Swift 6.3 / Ubuntu 24.04 / ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            architecture: x86_64
          - runner: ubuntu-24.04-arm
            architecture: arm64
    runs-on: ${{ matrix.runner }}
    container:
      image: swift:6.3.3-noble@sha256:66520bcba471018a34fd54ba09be97ba4abebd950a96ff5cb8c2bf50a2d33259
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Restore build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .build/linux
          key: >-
            swift-build-v1-${{ runner.os }}-${{ runner.arch }}-linux-${{
            hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swift-build-v1-${{ runner.os }}-${{ runner.arch }}-linux-
      - name: Show toolchain
        run: swift --version
      - name: Resolve dependency checkouts
        run: swift package --scratch-path .build/linux resolve
      - name: Test debug
        run: >-
          swift test
          --parallel
          --experimental-maximum-parallelization-width 4
          --scratch-path .build/linux
      - name: Test release
        run: >-
          swift test
          -c release
          --parallel
          --experimental-maximum-parallelization-width 4
          --skip ExitTests
          --scratch-path .build/linux

  android:
    name: Swift 6.3 / Android SDK / arm64 + x86_64
    runs-on: ubuntu-24.04
    container:
      image: swift:6.3.3-noble@sha256:66520bcba471018a34fd54ba09be97ba4abebd950a96ff5cb8c2bf50a2d33259
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Load Android toolchain configuration
        id: android-toolchain
        run: |
          . Scripts/android-toolchain.sh
          swift_sdks_path="$HOME/.swiftpm/swift-sdks"
          swift_sdk_cache_path="$swift_sdks_path/${ANDROID_SWIFT_SDK_ID}.artifactbundle"
          android_ndk_home="$RUNNER_TEMP/$ANDROID_NDK_DIRECTORY_NAME"
          {
            echo "ANDROID_NDK_DIRECTORY_NAME=$ANDROID_NDK_DIRECTORY_NAME"
            echo "ANDROID_NDK_HOME=$android_ndk_home"
            echo "ANDROID_NDK_URL=$ANDROID_NDK_URL"
            echo "ANDROID_NDK_SHA1=$ANDROID_NDK_SHA1"
            echo "ANDROID_SWIFT_SDK_URL=$ANDROID_SWIFT_SDK_URL"
            echo "ANDROID_SWIFT_SDK_CHECKSUM=$ANDROID_SWIFT_SDK_CHECKSUM"
            echo "ANDROID_SWIFT_SDKS_PATH=$swift_sdks_path"
            echo "ANDROID_SWIFT_SDK_DIRECTORY=$swift_sdk_cache_path/swift-android"
          } >> "$GITHUB_ENV"
          {
            echo "apt_cache_epoch=$(date -u +%G-%V)"
            echo "ndk_cache_path=$android_ndk_home"
            echo "ndk_release=$ANDROID_NDK_RELEASE"
            echo "ndk_sha1=$ANDROID_NDK_SHA1"
            echo "swift_sdk_cache_path=$swift_sdk_cache_path"
            echo "swift_sdk_checksum=$ANDROID_SWIFT_SDK_CHECKSUM"
            echo "swift_version=$ANDROID_SWIFT_VERSION"
          } >> "$GITHUB_OUTPUT"
      - name: Restore apt package cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .build/apt-cache
          key: >-
            apt-v3-${{ runner.os }}-swift-6.3.3-noble-curl-unzip-${{
            steps.android-toolchain.outputs.apt_cache_epoch }}
          restore-keys: |
            apt-v3-${{ runner.os }}-swift-6.3.3-noble-curl-unzip-
      - name: Install archive tools
        run: |
          apt_cache_directory="$GITHUB_WORKSPACE/.build/apt-cache"
          mkdir -p "$apt_cache_directory/partial"
          apt-get update
          apt-get \
            -o Dir::Cache::archives="$apt_cache_directory" \
            install --yes --no-install-recommends curl unzip
      - name: Restore Swift Android SDK cache
        id: swift-android-sdk-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ steps.android-toolchain.outputs.swift_sdk_cache_path }}
          key: >-
            swift-android-sdk-v1-${{ runner.os }}-${{
            steps.android-toolchain.outputs.swift_version }}-${{
            steps.android-toolchain.outputs.swift_sdk_checksum }}
      - name: Install Swift Android SDK
        if: steps.swift-android-sdk-cache.outputs.cache-hit != 'true'
        run: >-
          swift sdk install --swift-sdks-path "$ANDROID_SWIFT_SDKS_PATH"
          "$ANDROID_SWIFT_SDK_URL"
          --checksum "$ANDROID_SWIFT_SDK_CHECKSUM"
      - name: Restore Android NDK cache
        id: android-ndk-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ steps.android-toolchain.outputs.ndk_cache_path }}
          key: >-
            android-ndk-v1-${{ runner.os }}-${{
            steps.android-toolchain.outputs.ndk_release }}-${{
            steps.android-toolchain.outputs.ndk_sha1 }}
      - name: Install Android NDK
        if: steps.android-ndk-cache.outputs.cache-hit != 'true'
        run: |
          ndk_archive="${RUNNER_TEMP}/${ANDROID_NDK_DIRECTORY_NAME}-linux.zip"
          curl --fail --location --retry 3 \
            --output "$ndk_archive" \
            "$ANDROID_NDK_URL"
          echo "$ANDROID_NDK_SHA1  $ndk_archive" | sha1sum --check --strict
          unzip -q "$ndk_archive" -d "$RUNNER_TEMP"
      - name: Verify Android NDK
        run: |
          test -d "$ANDROID_NDK_HOME"
      - name: Configure Swift Android SDK
        run: |
          cd "$ANDROID_SWIFT_SDK_DIRECTORY"
          ./scripts/setup-android-sdk.sh
      - name: Restore Android build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .build/android
          key: >-
            swift-build-v2-${{ runner.os }}-${{ runner.arch }}-android-6.3.3-${{
            hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swift-build-v2-${{ runner.os }}-${{ runner.arch }}-android-6.3.3-
      - name: Cross-build Android package
        run: Scripts/validate-android.sh

  wasm:
    name: Swift 6.3.1 / WASI SDK / wasm32
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Load WASM toolchain configuration
        id: wasm-toolchain
        run: |
          . Scripts/wasm-toolchain.sh
          # ~/.swiftpm/swift-sdks is a *symlink* to this real location,
          # created lazily by the toolchain on first use. On a fresh runner
          # that symlink doesn't exist yet, so restoring a cache keyed to
          # the symlinked path makes actions/cache materialize it as a
          # plain directory instead — `swift sdk list` reads the real path
          # directly and never sees an SDK restored that way. Cache the
          # real path so restore always lands where discovery looks.
          swift_sdks_path="$HOME/Library/org.swift.swiftpm/swift-sdks"
          swift_sdk_cache_path="$swift_sdks_path/${WASM_SWIFT_SDK_ID}.artifactbundle"
          {
            echo "WASM_SWIFT_SDK_URL=$WASM_SWIFT_SDK_URL"
            echo "WASM_SWIFT_SDK_CHECKSUM=$WASM_SWIFT_SDK_CHECKSUM"
          } >> "$GITHUB_ENV"
          {
            echo "swift_sdk_cache_path=$swift_sdk_cache_path"
            echo "swift_sdk_checksum=$WASM_SWIFT_SDK_CHECKSUM"
            echo "swift_version=$WASM_SWIFT_VERSION"
            echo "host_toolchain_dir=$WASM_HOST_TOOLCHAIN_DIR"
            echo "host_toolchain_bin=$WASM_HOST_TOOLCHAIN_BIN"
            echo "host_toolchain_checksum=$WASM_HOST_TOOLCHAIN_CHECKSUM"
            echo "brew_cache_epoch=$(date -u +%G-%V)"
          } >> "$GITHUB_OUTPUT"
      - name: Restore Swift host toolchain cache
        id: host-toolchain-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ steps.wasm-toolchain.outputs.host_toolchain_dir }}
          key: >-
            swift-host-toolchain-v1-${{ runner.os }}-${{
            steps.wasm-toolchain.outputs.swift_version }}-${{
            steps.wasm-toolchain.outputs.host_toolchain_checksum }}
      - name: Install Swift host toolchain
        # Xcode's own bundled clang has no WebAssembly LLVM target compiled
        # in (confirmed: only Xcode 27 betas add it), regardless of which
        # Swift version it bundles, so a wasm build always needs this
        # separately installed swift.org toolchain. The wasm SDK bundle is
        # in turn pinned to this exact host Swift version.
        if: steps.host-toolchain-cache.outputs.cache-hit != 'true'
        run: |
          . Scripts/wasm-toolchain.sh
          toolchain_package="$RUNNER_TEMP/swift-toolchain.pkg"
          curl --fail --location --retry 3 \
            --output "$toolchain_package" \
            "$WASM_HOST_TOOLCHAIN_URL"
          echo "$WASM_HOST_TOOLCHAIN_CHECKSUM  $toolchain_package" | shasum -a 256 --check --strict
          sudo installer -pkg "$toolchain_package" -target /
      - name: Use Swift host toolchain
        run: echo "${{ steps.wasm-toolchain.outputs.host_toolchain_bin }}" >> "$GITHUB_PATH"
      - name: Show toolchain
        run: swift --version
      - name: Restore Swift WASI SDK cache
        id: swift-wasm-sdk-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ steps.wasm-toolchain.outputs.swift_sdk_cache_path }}
          key: >-
            swift-wasm-sdk-v2-${{ runner.os }}-${{
            steps.wasm-toolchain.outputs.swift_version }}-${{
            steps.wasm-toolchain.outputs.swift_sdk_checksum }}
      - name: Install Swift WASI SDK
        if: steps.swift-wasm-sdk-cache.outputs.cache-hit != 'true'
        run: >-
          swift sdk install "$WASM_SWIFT_SDK_URL"
          --checksum "$WASM_SWIFT_SDK_CHECKSUM"
      - name: Restore Homebrew wasmtime cache
        id: wasmtime-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            /opt/homebrew/Cellar/wasmtime
            /opt/homebrew/bin/wasmtime
          key: >-
            wasmtime-v1-${{ runner.os }}-${{ runner.arch }}-${{
            steps.wasm-toolchain.outputs.brew_cache_epoch }}
      - name: Install wasmtime
        if: steps.wasmtime-cache.outputs.cache-hit != 'true'
        run: brew install wasmtime
      - name: Link cached wasmtime
        if: steps.wasmtime-cache.outputs.cache-hit == 'true'
        run: brew link --overwrite wasmtime
      - name: Restore WASM build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .build/wasm
          key: >-
            swift-build-v1-${{ runner.os }}-${{ runner.arch }}-wasm-${{
            steps.wasm-toolchain.outputs.swift_version }}-${{
            hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swift-build-v1-${{ runner.os }}-${{ runner.arch }}-wasm-${{ steps.wasm-toolchain.outputs.swift_version }}-
      - name: Cross-build and run WasmDemo and TestDoublesWasmTests under wasmtime
        run: Scripts/validate-wasm.sh

  apple-platforms:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS 16+ Simulator / arm64
            platform: iOS
            cache_key: ios
          - name: Mac Catalyst 16+ / arm64
            destination: platform=macOS,arch=arm64,variant=Mac Catalyst
            cache_key: mac-catalyst
          - name: tvOS 16+ Simulator / arm64
            platform: tvOS
            cache_key: tvos
          - name: visionOS 1+ Simulator / arm64
            platform: visionOS
            cache_key: visionos
          - name: watchOS 9+ Simulator / arm64
            platform: watchOS
            cache_key: watchos
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Select Xcode 26.4.1
        run: sudo xcode-select --switch /Applications/Xcode_26.4.1.app/Contents/Developer
      - name: Show toolchain
        run: swift --version
      - name: Restore DerivedData cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .build/ci-apple-platform
          key: >-
            derived-data-v2-${{ runner.os }}-${{ runner.arch }}-${{
            matrix.cache_key }}-xcode-26.4.1-${{
            hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            derived-data-v2-${{ runner.os }}-${{ runner.arch }}-${{ matrix.cache_key }}-xcode-26.4.1-
      - name: Select destination
        id: destination
        env:
          PLATFORM: ${{ matrix.platform }}
          DESTINATION: ${{ matrix.destination }}
        run: |
          if [[ -n "$PLATFORM" ]]; then
            runtime="$(
              xcrun simctl list runtimes --json |
                jq -r --arg platform "$PLATFORM" '
                  [.runtimes[] | select(.isAvailable and (.name | startswith($platform + " ")))]
                  | min_by(.version | split(".") | map(tonumber))
                  | .identifier // empty
                '
            )"
            test -n "$runtime"
            udid="$(
              xcrun simctl list devices available --json |
                jq -r --arg runtime "$runtime" '
                  .devices[$runtime] | sort_by(.name) | first | .udid // empty
                '
            )"
            test -n "$udid"
            echo "Selected $runtime device $udid"
            xcrun simctl boot "$udid" &
            echo "value=platform=$PLATFORM Simulator,id=$udid,arch=arm64" >> "$GITHUB_OUTPUT"
            echo "parallelism=NO" >> "$GITHUB_OUTPUT"
          else
            echo "value=$DESTINATION" >> "$GITHUB_OUTPUT"
            echo "parallelism=YES" >> "$GITHUB_OUTPUT"
          fi
      - name: Test
        run: >-
          xcodebuild
          -scheme swift-test-doubles-Package
          -destination '${{ steps.destination.outputs.value }}'
          -derivedDataPath .build/ci-apple-platform
          -resultBundlePath .build/results/${{ matrix.cache_key }}.xcresult
          -parallel-testing-enabled ${{ steps.destination.outputs.parallelism }}
          -quiet
          test
      - name: Upload xcresult
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: xcresult-${{ matrix.cache_key }}
          path: .build/results/${{ matrix.cache_key }}.xcresult
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: true

  native-intel:
    name: Swift 6.3 / native x86_64
    runs-on: macos-26-intel
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Restore build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .build/ci-native-intel
          key: >-
            swift-build-v1-${{ runner.os }}-${{ runner.arch }}-native-intel-${{
            hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swift-build-v1-${{ runner.os }}-${{ runner.arch }}-native-intel-
      - name: Select Xcode 26.4.1
        run: sudo xcode-select --switch /Applications/Xcode_26.4.1.app/Contents/Developer
      - name: Show toolchain
        run: swift --version
      - name: Test debug
        run: |
          swift test \
            --parallel \
            --experimental-maximum-parallelization-width 4 \
            --scratch-path .build/ci-native-intel \
            --triple x86_64-apple-macosx \
            --disable-xctest \
            --enable-swift-testing
      - name: Test release
        run: |
          swift test \
            -c release \
            --parallel \
            --experimental-maximum-parallelization-width 4 \
            --skip ExitTests \
            --scratch-path .build/ci-native-intel \
            --triple x86_64-apple-macosx \
            --disable-xctest \
            --enable-swift-testing
  sanitizers:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Address Sanitizer
            sanitizer: address
            runner_arguments: >-
              --parallel
              --experimental-maximum-parallelization-width 4
          - name: Thread Sanitizer
            sanitizer: thread
            runner_arguments: >-
              --parallel
              --experimental-maximum-parallelization-width 4
    runs-on: macos-26
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Restore build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .build/ci-${{ matrix.sanitizer }}-sanitizer
          key: >-
            swift-build-v1-${{ runner.os }}-${{ runner.arch }}-${{
            matrix.sanitizer }}-sanitizer-${{
            hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swift-build-v1-${{ runner.os }}-${{ runner.arch }}-${{ matrix.sanitizer }}-sanitizer-
      - name: Select Xcode 26.4.1
        run: sudo xcode-select --switch /Applications/Xcode_26.4.1.app/Contents/Developer
      - name: Show toolchain
        run: swift --version
      - name: Test
        run: >-
          swift test
          --sanitize ${{ matrix.sanitizer }}
          ${{ matrix.runner_arguments }}
          --skip ExitTests
          --scratch-path .build/ci-${{ matrix.sanitizer }}-sanitizer

  coverage:
    name: Swift source coverage
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Restore build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .build/ci-coverage
          key: >-
            swift-build-v1-${{ runner.os }}-${{ runner.arch }}-coverage-${{
            hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swift-build-v1-${{ runner.os }}-${{ runner.arch }}-coverage-
      - name: Select Xcode 26.4.1
        run: sudo xcode-select --switch /Applications/Xcode_26.4.1.app/Contents/Developer
      - name: Enforce 85% Swift source coverage
        run: Scripts/check-coverage.sh 85 .build/ci-coverage
      - name: Convert coverage to lcov
        run: |
          BINARY=$(find -L .build/ci-coverage/debug -name "swift-test-doublesPackageTests" -type f -not -path "*.dSYM/*" | head -1)
          PROFDATA=$(find -L .build/ci-coverage/debug/codecov -name "default.profdata" | head -1)
          xcrun llvm-cov export \
            -format=lcov \
            "$BINARY" \
            -instr-profile "$PROFDATA" \
            -ignore-filename-regex=".build|Tests" \
            > coverage.lcov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.lcov
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

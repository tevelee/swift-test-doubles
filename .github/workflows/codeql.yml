name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "Sources/**"
      - "Package*.swift"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "Sources/**"
      - "Package*.swift"
      - ".github/workflows/**"
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  analyze-actions:
    name: Analyze Actions
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:actions

  analyze-swift:
    name: Analyze Swift
    if: github.event.repository.private == false
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Restore SwiftPM cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: >-
            swiftpm-codeql-v1-${{ runner.os }}-${{ runner.arch }}-${{
            hashFiles('Package.resolved') }}
          restore-keys: |
            swiftpm-codeql-v1-${{ runner.os }}-${{ runner.arch }}-
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual
      - name: Build
        run: swift build
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:swift

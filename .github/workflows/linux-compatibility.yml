name: Linux Compatibility

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  candidate-fix:
    name: Swift 6.1 / Ubuntu 24.04 / ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            architecture: x86_64
          - runner: ubuntu-24.04-arm
            architecture: arm64
    runs-on: ${{ matrix.runner }}
    container: swift:6.1.3-noble
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Restore SwiftPM cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/org.swift.swiftpm
          key: >-
            swiftpm-v1-${{ runner.os }}-${{ runner.arch }}-${{
            hashFiles('Package.resolved', 'IntegrationTests/Consumer/Package.resolved') }}
          restore-keys: |
            swiftpm-v1-${{ runner.os }}-${{ runner.arch }}-
      - name: Show toolchain
        run: swift --version
      - name: Resolve dependency checkouts
        run: |
          swift package --scratch-path .build/linux-compatibility resolve
          swift package \
            --package-path IntegrationTests/Consumer \
            --scratch-path .build/linux-compatibility-consumer \
            resolve
      - name: Apply candidate Echo compatibility fix
        run: |
          for checkout in \
            .build/linux-compatibility/checkouts/Echo \
            .build/linux-compatibility-consumer/checkouts/Echo
          do
            source="$checkout/Sources/Echo/ContextDescriptor/ClassDescriptor.swift"
            if test -f "$source" && grep -q 'Int\.AtomicRepresentation' "$source"; then
              sed -i \
                's/Int\.AtomicRepresentation/UnsafeAtomic<Int>.Storage/g' \
                "$source"
            fi
          done
      - name: Test debug
        run: swift test --scratch-path .build/linux-compatibility
      - name: Test release
        run: swift test -c release --scratch-path .build/linux-compatibility
      - name: Test as an external consumer
        run: >-
          swift test
          --package-path IntegrationTests/Consumer
          --scratch-path .build/linux-compatibility-consumer
